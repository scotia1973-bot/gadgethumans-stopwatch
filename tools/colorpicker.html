<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Picker — Free Online Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .container {
            background: #fff;
            max-width: 520px;
            width: 100%;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.12);
            padding: 32px;
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            text-align: center;
            color: #1a1a2e;
            margin-bottom: 24px;
        }

        .swatch-wrapper {
            margin-bottom: 20px;
        }

        .preview-swatch {
            width: 100%;
            height: 200px;
            border-radius: 12px;
            border: 2px solid #e0e0e0;
            background: #ff6b6b;
            transition: background 0.15s ease;
        }

        .native-picker {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        input[type="color"] {
            width: 60px;
            height: 40px;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 2px;
            cursor: pointer;
            background: none;
        }

        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        input[type="color"]::-webkit-color-swatch {
            border: none;
            border-radius: 6px;
        }

        .hex-input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .hex-input-group label {
            font-weight: 600;
            font-size: 14px;
            color: #333;
            align-self: center;
        }

        .hex-input-group input[type="text"] {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            font-family: "SF Mono", "Fira Code", "Consolas", monospace;
            letter-spacing: 0.5px;
            outline: none;
            transition: border-color 0.2s;
        }

        .hex-input-group input[type="text"]:focus {
            border-color: #4a90d9;
            box-shadow: 0 0 0 2px rgba(74, 144, 217, 0.15);
        }

        .values-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .value-card {
            background: #f7f8fa;
            border-radius: 10px;
            padding: 14px 10px;
            text-align: center;
        }

        .value-card .label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #888;
            margin-bottom: 6px;
        }

        .value-card .value {
            font-size: 15px;
            font-weight: 600;
            color: #222;
            font-family: "SF Mono", "Fira Code", "Consolas", monospace;
            word-break: break-all;
        }

        .value-card.rgb { grid-column: 1 / 2; }
        .value-card.hex { grid-column: 2 / 3; }
        .value-card.hsl { grid-column: 3 / 4; }

        .copy-btn {
            display: block;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #1a1a2e;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .copy-btn:hover {
            background: #16213e;
        }

        .copy-btn:active {
            transform: scale(0.97);
        }

        .toast {
            visibility: hidden;
            min-width: 180px;
            background: #333;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 10px 16px;
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.3s, visibility 0.3s;
            font-size: 14px;
            font-weight: 500;
            z-index: 999;
        }

        .toast.show {
            visibility: visible;
            opacity: 1;
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }

            .preview-swatch {
                height: 160px;
            }

            .values-grid {
                grid-template-columns: 1fr;
                gap: 8px;
            }

            .value-card.rgb,
            .value-card.hex,
            .value-card.hsl {
                grid-column: 1 / 2;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎨 Color Picker</h1>

        <div class="swatch-wrapper">
            <div class="preview-swatch" id="previewSwatch"></div>
        </div>

        <div class="native-picker">
            <input type="color" id="colorInput" value="#ff6b6b">
        </div>

        <div class="hex-input-group">
            <label for="hexText">Hex</label>
            <input type="text" id="hexText" value="#ff6b6b" maxlength="7" placeholder="#rrggbb">
        </div>

        <div class="values-grid">
            <div class="value-card hex">
                <div class="label">HEX</div>
                <div class="value" id="hexValue">#ff6b6b</div>
            </div>
            <div class="value-card rgb">
                <div class="label">RGB</div>
                <div class="value" id="rgbValue">rgb(255, 107, 107)</div>
            </div>
            <div class="value-card hsl">
                <div class="label">HSL</div>
                <div class="value" id="hslValue">hsl(0, 100%, 71%)</div>
            </div>
        </div>

        <button class="copy-btn" id="copyBtn">📋 Copy as Hex</button>
    </div>

    <div class="toast" id="toast">Copied!</div>

    <script>
        (function() {
            const colorInput   = document.getElementById('colorInput');
            const hexText      = document.getElementById('hexText');
            const previewSwatch = document.getElementById('previewSwatch');
            const hexValue     = document.getElementById('hexValue');
            const rgbValue     = document.getElementById('rgbValue');
            const hslValue     = document.getElementById('hslValue');
            const copyBtn      = document.getElementById('copyBtn');
            const toast        = document.getElementById('toast');

            let ignoreNextHexTextUpdate = false;

            // --- helpers ---

            function hexToRgb(hex) {
                const r = parseInt(hex.slice(1, 3), 16);
                const g = parseInt(hex.slice(3, 5), 16);
                const b = parseInt(hex.slice(5, 7), 16);
                return { r, g, b };
            }

            function rgbToHsl(r, g, b) {
                r /= 255;
                g /= 255;
                b /= 255;
                const max = Math.max(r, g, b);
                const min = Math.min(r, g, b);
                let h, s, l = (max + min) / 2;

                if (max === min) {
                    h = s = 0;
                } else {
                    const d = max - min;
                    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                    switch (max) {
                        case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
                        case g: h = ((b - r) / d + 2) / 6; break;
                        case b: h = ((r - g) / d + 4) / 6; break;
                    }
                }

                return {
                    h: Math.round(h * 360),
                    s: Math.round(s * 100),
                    l: Math.round(l * 100)
                };
            }

            function updateUI(hex) {
                // Normalize to 6-digit lowercase
                hex = hex.toLowerCase();
                if (!/^#[0-9a-f]{6}$/.test(hex)) return;

                const { r, g, b } = hexToRgb(hex);
                const hsl = rgbToHsl(r, g, b);

                previewSwatch.style.background = hex;
                hexValue.textContent = hex;

                rgbValue.textContent = `rgb(${r}, ${g}, ${b})`;
                hslValue.textContent = `hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)`;
            }

            function setColor(hex) {
                if (!/^#[0-9a-f]{6}$/i.test(hex)) return;
                updateUI(hex);

                ignoreNextHexTextUpdate = true;
                colorInput.value = hex;
                hexText.value = hex;
            }

            // --- event handlers ---

            // Native color picker changed
            colorInput.addEventListener('input', function() {
                const hex = this.value; // always 6-digit hex with #
                setColor(hex);
            });

            // Manual hex text input
            hexText.addEventListener('input', function() {
                if (ignoreNextHexTextUpdate) {
                    ignoreNextHexTextUpdate = false;
                    return;
                }

                let val = this.value.trim();
                if (val.length === 6 && /^[0-9a-f]{6}$/i.test(val)) {
                    val = '#' + val;
                }

                if (/^#[0-9a-f]{6}$/i.test(val)) {
                    setColor(val);
                }
            });

            // Also update when user blurs — auto-correct partial input
            hexText.addEventListener('blur', function() {
                let val = this.value.trim();
                if (val.length === 6 && /^[0-9a-f]{6}$/i.test(val)) {
                    val = '#' + val;
                }
                if (/^#[0-9a-f]{6}$/i.test(val)) {
                    setColor(val);
                } else {
                    // revert to current value on invalid blur
                    this.value = colorInput.value;
                }
            });

            // --- Copy ---
            copyBtn.addEventListener('click', function() {
                const text = hexValue.textContent;
                navigator.clipboard.writeText(text).then(() => {
                    toast.textContent = 'Copied ' + text;
                    toast.classList.add('show');
                    setTimeout(() => toast.classList.remove('show'), 1800);
                }).catch(() => {
                    // fallback
                    const ta = document.createElement('textarea');
                    ta.value = text;
                    ta.style.position = 'fixed';
                    ta.style.opacity = '0';
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand('copy');
                    document.body.removeChild(ta);
                    toast.textContent = 'Copied ' + text;
                    toast.classList.add('show');
                    setTimeout(() => toast.classList.remove('show'), 1800);
                });
            });

            // --- init ---
            setColor('#ff6b6b');
        })();
    </script>

</body>
</html>
